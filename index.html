<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>My Library</h1>
    <p>Press the button to add books to the shelf. Hover over a book to see its info.</p>
    <button command="show-modal" commandfor="book-dialog">Add Book</button>

    <dialog id="book-dialog">
        <h1>Add Book</h1>
        <form id="add-book">
            <label for="title">Book Title:</label>
            <input type="text" name="title" id="title" required>
            <label for="author">Author: </label>
            <input type="text" name="author" id="author" required>
            <label for="pages">Pages: </label>
            <input type="number" id="pages" name="pages" min="1" value="1" required>
            <div>
                <input type="checkbox" id="read" name="read">
                <label for="read">Read</label>
            </div>
        </form>
        <button id="submit-button" type="submit" form="add-book">Add Book</button>
        <button commandfor="book-dialog" command="close">Close</button>
    </dialog>

    <div id="book-container">
        <div id="books">
        </div>
        <div id="shelf-design">
            <div id="shelf-top"></div>
            <div id="shelf-bottom"></div>
        </div>
    </div>

    <div id="info-container">
        <section class="info-border">
            <div>
                <div class="info-title">Info</div>
                <div id="info-contents">
                    <p id="info-text"></p>
                </div>
            </div>
        </section>
    </div>
    
</body>
</html>
